
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
<div id="navbar"></div>
<div style="
  min-height: calc(100vh - var(--nav-h));
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 8%; text-align: center;
  background: var(--bg);
">
  <div style="font-size:56px; margin-bottom:24px; opacity:.3;">404</div>
  <h1 style="
    font-family: var(--font-display);
    font-size: clamp(1.5rem,3vw,2rem);
    font-weight:400; color:var(--dark); margin-bottom:12px;
  ">Halaman Tidak Ditemukan</h1>
  <p style="font-size:14px;color:var(--mid);font-weight:300;margin-bottom:32px;max-width:360px;line-height:1.8;">
    Halaman yang Anda cari mungkin telah dipindahkan atau tidak tersedia.
  </p>
  <a href="/" class="btn btn-dark">← Kembali ke Beranda</a>
</div>
<footer class="footer">
  <div class="footer-logo">SMAN 1 CONTOH</div>
  <div class="footer-copy">© 2026 SMAN 1 Contoh.</div>
</footer>

<script src="/assets/js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
 const navbar=document.getElementById('navbar');
 if(navbar){
   try{
    const r=await fetch('/components/nav.html');
    navbar.innerHTML=await r.text();
   }catch(e){console.log(e)}
 }
});
</script>
</body></html>
